    thesis: https://drive.google.com/file/d/1QQyec3J5oGw8yM3c2oo88suivZzJzirt/view?usp=sharing
  coverPageSummary: |
    I am an associate professor at Politecnico di Milano and I have worked
    in processor architecture research and development for one of the top
    semiconductor companies in the world. My background is rooted in modeling
    and simulation of digital systems although I have expanded my interests
    to functional programming and domain specific languages.
    In 2016 I've helped introduce some novel theoretical results
    in the field of cryptography and (in 2015 and 2017) I've been awarded
    with several grants from industrial partners for devising a reliable
    design methodology for cryptographic circuits.
  websiteSummary: |
    Welcome to my website.
    I am an associate professor at Politecnico di Milano and I have worked
    in embedded processor architecture R&D for one of the top
    semiconductor companies in the world.

    My group is currently working on topics 
    related to embedded systems (hardware and software), 
    security, cryptography, operating systems. If you
    are inclined to work on these topics feel free to get in touch for a
    possible collaboration or a thesis.
  officialDeptPage: |
    He received the Laurea degree in Computer Engineering
    in 1998 and the Ph. D. degree in Computer Engineering in 2002 at the
    Politecnico di Milano, Italy. He is currently associate Professor at the
    Dipartimento di Elettronica e Informazione, Politecnico di Milano where he
    currently investigates novel techniques for computer aided design of digital
    circuits with emphasis on cryptography. From 2003 until 2007, he held various positions
    in the Advanced System Technology group at STMicroelectronics where he was
    involved in the architectural specification and design of multi-threaded
    processors with particular emphasis on emerging stream-programming
    paradigms. He has also been involved in the development of tools and
    methodologies for designing low-power industrial networks on chip (NoC). 
    He has published a book, over 80 papers in either international journals 
    or conference proceedings and he holds two US
    patents. He has also been appointed as Principal Investigator for industrial 
    collaboration grants from STMicroelectronics related to the design cryptographic 
    hardware using functional programming languages.
  shortBio: |
    Vittorio Zaccaria is an associate professor at Politecnico di Milano where he
    currently investigates novel techniques for computer aided design of digital
    circuits with emphasis on cryptography. He has published a book, over 80 papers
    in international journals and conference proceedings and he holds two US
    patents.
  mur:
    lessThan2000c:
      ita: |
        Vittorio Zaccaria è Professore Associato di Sistemi Operativi Avanzati per il corso di studi in Ingegneria Informatica al Politecnico di Milano. E' attualmente referente del Politecnico di Milano presso la RISC-V International association ed è impegnato nella ricerca su architetture di calcolo ad alta efficienza energetica, sistemi operativi, sicurezza, crittografia ed electronic design automation. Ha conseguito la Laurea in Ingegneria Informatica nel 1998 e il titolo di Dottore di Ricerca in Ingegneria Informatica nel 2002 presso il Politecnico di Milano, Italia e dal 2011 al 2020 è stato ricercatore presso il Dipartimento DEIB del Politecnico di Milano.  E' stato referente scientifico per progetti industriali finanziati da STMicroelectronics ed è stato coinvolto in diversi progetti europei come 2PARMA (2010-2013) e MULTICUBE (2008-2010). Precedentemente ha ricoperto varie posizioni di ricerca industriale nel gruppo Advanced System Technology di STMicroelectronics ad Agrate Brianza e Lugano dove è stato coinvolto nella specifica architettura e design di processori paralleli, con particolare attenzione su architetture streaming e network a bassa potenza su chip (NOC). Ha pubblicato un libro, oltre 90 pubblicazioni su riviste internazionali e atti di conferenze e ha ottenuto due brevetti americani.
      eng: |
        Vittorio Zaccaria received the Laurea degree in Computer Engineering in
        1998 and the Ph. D. degree in Computer Engineering in 2002 at the
        Politecnico di Milano, Italy. He is currently associate professor at the
        Politecnico di Milano where he currently investigates novel techniques for
        computer aided design of digital circuits. From 2003 until 2007, he held
        various positions in the Advanced System Technology group at
        STMicroelectronics where he was involved in the architectural
        specification and design of multi-threaded processors with particular
        emphasis on emerging stream-programming paradigms. He has also been
        involved in the development of tools and methodologies for designing
        low-power industrial networks on chip (NoC).
