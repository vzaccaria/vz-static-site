  currentGoals:
    short: |
      I am interested in designing and validating embedded systems, with a particular focus on hardware security, 
      secure channels for microcontrollers, remote attestation, firmware updates with live 
      state transfer, electromagnetic fault injection, kernel exploitation and mitigation 
      strategies, and compiler optimization for edge AI accelerators. 
      I am broadly interested in dependable resource-constrained systems and the 
      interplay between software, hardware, and security.
    itemized:
      - area: Cryptography
        keywords:
          - side channel attacks and countermeasures
          - masking and probing security
      - area: Hardware
        keywords:
          - design space exploration
          - modeling and simulation
          - hardware description languages
      - area: Software
        keywords:
          - embedded operating systems
          - virtualisation
          - domain specific languages
          - functional programming
